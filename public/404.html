<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Informes psicológicos</title>
  <script>
    // GitHub Pages SPA redirect script
    // Encodes the full URL path/hash into a query string before redirecting
    // so the main index.html can restore the original URL on load.
    var segmentCount = 1; // number of path segments in the repo name (1 for /Informes-Psicologicos)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
